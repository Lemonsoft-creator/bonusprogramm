<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonusprogramm – Login & Registrierung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>All in Sport Bonusprogramm</h1>
  </header>
  <div class="container">
    <h2>Anmelden</h2>
    <div id="login-message" class="message" style="display:none"></div>
    <form id="login-form">
      <div>
        <label for="login-email">E‑Mail</label>
        <input type="email" id="login-email" required>
      </div>
      <div>
        <label for="login-password">Passwort</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit">Login</button>
    </form>

    <hr>
    <h2>Registrieren</h2>
    <div id="register-message" class="message" style="display:none"></div>
    <form id="register-form">
      <div>
        <label for="reg-title">Anrede</label>
        <select id="reg-title">
          <option value="Herr">Herr</option>
          <option value="Frau">Frau</option>
        </select>
      </div>
      <div>
        <label for="reg-firstName">Vorname</label>
        <input type="text" id="reg-firstName" required>
      </div>
      <div>
        <label for="reg-lastName">Nachname</label>
        <input type="text" id="reg-lastName" required>
      </div>
      <div>
        <label for="reg-gym">Gym</label>
        <input type="text" id="reg-gym" required>
      </div>
      <div>
        <label for="reg-phone">Telefonnummer</label>
        <input type="tel" id="reg-phone" required>
      </div>
      <div>
        <label for="reg-email">E‑Mail</label>
        <input type="email" id="reg-email" required>
      </div>
      <div>
        <label for="reg-password">Passwort</label>
        <input type="password" id="reg-password" required>
      </div>
      <div>
        <label for="reg-adminCode">Admin‑Code (optional)</label>
        <input type="text" id="reg-adminCode">
      </div>
      <button type="submit">Registrieren</button>
    </form>
  </div>

  <script>
    // Login form submit
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const messageEl = document.getElementById('login-message');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('isAdmin', data.admin);
          // redirect depending on admin
          window.location.href = data.admin ? 'admin.html' : 'dashboard.html';
        } else {
          messageEl.textContent = data.message || 'Fehler beim Login';
          messageEl.className = 'message error';
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.textContent = 'Serverfehler';
        messageEl.className = 'message error';
        messageEl.style.display = 'block';
      }
    });
    // Register form submit
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const title = document.getElementById('reg-title').value;
      const firstName = document.getElementById('reg-firstName').value;
      const lastName = document.getElementById('reg-lastName').value;
      const gym = document.getElementById('reg-gym').value;
      const phone = document.getElementById('reg-phone').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const adminCode = document.getElementById('reg-adminCode').value;
      const messageEl = document.getElementById('register-message');
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, firstName, lastName, gym, phone, email, password, adminCode })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('isAdmin', data.admin);
          window.location.href = data.admin ? 'admin.html' : 'dashboard.html';
        } else {
          messageEl.textContent = data.message || 'Registrierungsfehler';
          messageEl.className = 'message error';
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.textContent = 'Serverfehler';
        messageEl.className = 'message error';
        messageEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
