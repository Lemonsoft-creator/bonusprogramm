<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonusprogramm – Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mein Dashboard</h1>
    <nav>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>
  <div class="container">
    <h2>Willkommen, <span id="user-name"></span></h2>
    <p>Punktestand (Monat): <strong id="month-points">0</strong></p>
    <p>Punktestand (Jahr): <strong id="year-points">0</strong></p>
    <p id="next-reward-hint"></p>
    
    <h3>Trainingseintrag</h3>
    <div id="train-message" class="message" style="display:none"></div>
    <form id="train-form">
      <div>
        <label for="train-date">Datum</label>
        <input type="date" id="train-date" required>
      </div>
      <button type="submit">Training eintragen</button>
    </form>
    
    <h3>Leaderboard (Monat)</h3>
    <table id="leaderboard-month">
      <thead>
        <tr><th>Pos.</th><th>Name</th><th>Punkte</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    
    <h3>Leaderboard (Jahr)</h3>
    <table id="leaderboard-year">
      <thead>
        <tr><th>Pos.</th><th>Name</th><th>Punkte</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    
    <h3>Belohnungen</h3>
    <ul id="rewards-list"></ul>
  </div>
  
  <script>
    // Ensure user is logged in
    const userId = localStorage.getItem('userId');
    if (!userId) {
      window.location.href = 'index.html';
    }
    document.getElementById('logout-link').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'index.html';
    });
    
    async function fetchUser() {
      const res = await fetch('/api/user/' + userId);
      const data = await res.json();
      if (data.success) {
        const user = data.user;
        document.getElementById('user-name').textContent = `${user.firstName} ${user.lastName}`;
        document.getElementById('month-points').textContent = user.monthPoints;
        document.getElementById('year-points').textContent = user.yearPoints;
        loadRewards(user.yearPoints);
      }
    }
    
    async function loadLeaderboard() {
      // month
      let res = await fetch('/api/leaderboard?period=month');
      let data = await res.json();
      if (data.success) {
        const tbody = document.querySelector('#leaderboard-month tbody');
        tbody.innerHTML = '';
        data.leaderboard.forEach((entry, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${idx+1}</td><td>${entry.name}</td><td>${entry.points}</td>`;
          tbody.appendChild(tr);
        });
      }
      // year
      res = await fetch('/api/leaderboard?period=year');
      data = await res.json();
      if (data.success) {
        const tbody = document.querySelector('#leaderboard-year tbody');
        tbody.innerHTML = '';
        data.leaderboard.forEach((entry, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${idx+1}</td><td>${entry.name}</td><td>${entry.points}</td>`;
          tbody.appendChild(tr);
        });
      }
    }
    
    async function loadRewards(currentPoints) {
      const res = await fetch('/api/rewards/' + userId);
      const data = await res.json();
      const list = document.getElementById('rewards-list');
      list.innerHTML = '';
      if (data.success) {
        let nextHint = '';
        data.rewards.forEach(r => {
          const li = document.createElement('li');
          li.textContent = `${r.reward} (ab ${r.min} Punkte)`;
          if (r.eligible) {
            li.style.fontWeight = 'bold';
          }
          list.appendChild(li);
        });
        // determine hint for next reward
        const nextReward = data.rewards.find(r => !r.eligible);
        if (nextReward) {
          const diff = nextReward.min - currentPoints;
          nextHint = `Noch ${diff} Punkte bis zur nächsten Belohnung!`;
        } else {
          nextHint = 'Du hast alle Belohnungen erreicht!';
        }
        document.getElementById('next-reward-hint').textContent = nextHint;
      }
    }
    
    // Handle training submission
    document.getElementById('train-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const date = document.getElementById('train-date').value;
      const messageEl = document.getElementById('train-message');
      try {
        const res = await fetch('/api/training', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, date })
        });
        const data = await res.json();
        if (data.success) {
          messageEl.textContent = 'Training eingetragen – wartet auf Bestätigung.';
          messageEl.className = 'message success';
          messageEl.style.display = 'block';
        } else {
          messageEl.textContent = data.message || 'Fehler beim Eintragen.';
          messageEl.className = 'message error';
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.textContent = 'Serverfehler';
        messageEl.className = 'message error';
        messageEl.style.display = 'block';
      }
    });
    
    // Initialize
    fetchUser().then(() => {
      loadLeaderboard();
    });
  </script>
</body>
</html>
