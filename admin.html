<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonusprogramm – Admin Cockpit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Admin Cockpit</h1>
    <nav>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>
  <div class="container">
    <h2>Punkte vergeben</h2>
    <div id="award-message" class="message" style="display:none"></div>
    <form id="award-form">
      <div>
        <label for="award-user">User auswählen</label>
        <select id="award-user"></select>
      </div>
      <div>
        <label for="award-category">Kategorie</label>
        <select id="award-category">
          <option value="Neukunde">Neukunde (+50)</option>
          <option value="Firmentraining">Firmentraining (+75)</option>
          <option value="Spezialtraining">Spezialtraining (+5)</option>
          <option value="Privattraining">Privattraining (+10)</option>
        </select>
      </div>
      <button type="submit">Punkte vergeben</button>
    </form>
    
    <h2>Ausstehende Trainingseinträge</h2>
    <table id="pending-table">
      <thead>
        <tr><th>ID</th><th>User</th><th>Punkte</th><th>Kategorie</th><th>Aktion</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  
  <script>
    const adminId = localStorage.getItem('userId');
    const isAdmin = localStorage.getItem('isAdmin') === 'true';
    if (!adminId || !isAdmin) {
      window.location.href = 'index.html';
    }
    document.getElementById('logout-link').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'index.html';
    });
    
    async function loadUsers() {
      const res = await fetch('/api/leaderboard?period=year&limit=100');
      const data = await res.json();
      const select = document.getElementById('award-user');
      select.innerHTML = '';
      if (data.success) {
        data.leaderboard.forEach(u => {
          const option = document.createElement('option');
          option.value = u.id;
          option.textContent = u.name;
          select.appendChild(option);
        });
      }
    }
    
    async function loadPending() {
      const res = await fetch('/api/pending');
      const data = await res.json();
      const tbody = document.querySelector('#pending-table tbody');
      tbody.innerHTML = '';
      if (data.success) {
        const pendingList = data.pending;
        for (const p of pendingList) {
          // fetch user name
          const userRes = await fetch('/api/user/' + p.userId);
          const userData = await userRes.json();
          const name = userData.success ? `${userData.user.firstName} ${userData.user.lastName}` : p.userId;
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${p.id}</td><td>${name}</td><td>${p.points}</td><td>${p.category}</td><td></td>`;
          const actionTd = tr.lastChild;
          const approveBtn = document.createElement('button');
          approveBtn.textContent = 'Bestätigen';
          approveBtn.addEventListener('click', () => confirmPending(p.id, true));
          const rejectBtn = document.createElement('button');
          rejectBtn.textContent = 'Ablehnen';
          rejectBtn.style.marginLeft = '0.5rem';
          rejectBtn.addEventListener('click', () => confirmPending(p.id, false));
          actionTd.appendChild(approveBtn);
          actionTd.appendChild(rejectBtn);
          tbody.appendChild(tr);
        }
      }
    }
    
    async function confirmPending(pendingId, approve) {
      await fetch('/api/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminId, pendingId, approve })
      });
      loadPending();
    }
    
    document.getElementById('award-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const userId = document.getElementById('award-user').value;
      const category = document.getElementById('award-category').value;
      const messageEl = document.getElementById('award-message');
      try {
        const res = await fetch('/api/award', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId, userId, category })
        });
        const data = await res.json();
        if (data.success) {
          messageEl.textContent = `Punkte vergeben: +${data.points}`;
          messageEl.className = 'message success';
          messageEl.style.display = 'block';
          loadPending();
        } else {
          messageEl.textContent = data.message || 'Fehler beim Vergeben.';
          messageEl.className = 'message error';
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.textContent = 'Serverfehler';
        messageEl.className = 'message error';
        messageEl.style.display = 'block';
      }
    });
    
    // Initialize
    loadUsers();
    loadPending();
  </script>
</body>
</html>
